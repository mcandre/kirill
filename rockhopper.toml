# log_level = "debug"
log_level = "quiet"

[rocklet]
name = "kirill"
identifier = "com.github.mcandre.kirill"
rev = "1"
maintainer = "Andrew Pennebaker <n4jm4@pm.me>"
manufacturer = "YelloSoft"
summary = "JSON validator"
description = "kirill identifies syntax errors in JSON documents"
copyright = "Copyright (C) 2025 Andrew Pennebaker"
license = "0BSD"
url = "https://github.com/mcandre/kirill"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-alpine-linux"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/kirill/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-alpine-linux"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/kirill/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-fedora"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/kirill/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-fedora"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/kirill/aarch64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-freebsd"
rocklet.origin = "local/kirill"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "freebsd:*:amd64"
dest."usr/local/bin" = ".crit/bin/kirill/x86_64-unknown-freebsd"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-macos"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
dest."usr/local/bin" = ".crit/bin/kirill/x86_64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-macos"
rocklet.oci_arch = "linux/arm64"
rocklet.os_arch = "arm64"
dest."usr/local/bin" = ".crit/bin/kirill/aarch64-apple-darwin"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-netbsd"
rocklet.oci_arch = "linux/amd64"
rocklet.os_arch = "x86_64"
rocklet.pkg_os_version = "10.1"
# byte estimate, including dependencies
rocklet.pkg_size_all = "1000000"
dest."bin" = ".crit/bin/kirill/x86_64-unknown-netbsd"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-ubuntu"
rocklet.oci_arch = "linux/amd64"
dest."usr/bin" = ".crit/bin/kirill/x86_64-unknown-linux-musl"

[[pkg]]
image = "n4jm4/rockhopper:0.0.21-ubuntu"
rocklet.oci_arch = "linux/arm64"
dest."usr/bin" = ".crit/bin/kirill/aarch64-unknown-linux-musl"

[[pkg]]
